<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên Hệ - Antigravity</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background-color: #08080c;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Phông nền sao đơn giản */
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px),
                radial-gradient(rgba(255,255,255,.4), rgba(255,255,255,.1) 2px, transparent 30px);
            background-size: 550px 550px, 350px 350px, 250px 250px, 150px 150px; 
            background-position: 0 0, 40px 60px, 130px 270px, 70px 100px;
        }

        .contact-container {
            background: rgba(10, 10, 15, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        h1 {
            margin: 0 0 24px 0;
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(90deg, #bfff00, #55cc00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #e0e0e0;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .back-btn {
            display: inline-block;
            background: rgba(191, 255, 0, 0.1);
            color: #bfff00;
            border: 1px solid #bfff00;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .back-btn:hover {
            background: rgba(191, 255, 0, 0.2);
            box-shadow: 0 0 15px rgba(191, 255, 0, 0.5);
        }
    </style>
</head>
<body>
    <div class="contact-container">
        <h1>Liên Hệ</h1>
        <p>Phần thông tin liên hệ sẽ được bổ sung tại đây trong tương lai. Xin vui lòng quay lại sau.</p>
        <a href="index.html" class="back-btn">Quay lại Trang Chủ</a>
    </div>
</body>
</html>
