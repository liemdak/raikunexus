<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raiku Nexus - 3D Interactive System</title>
    
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- MediaPipe Holistic -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #08080c;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #ui-container {
            position: absolute;
            top: 24px;
            right: 24px;
            background: rgba(10, 10, 15, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            z-index: 10;
            min-width: 250px;
            transition: all 0.3s ease;
        }

        .toggle-btn {
            background: rgba(191, 255, 0, 0.1);
            color: #bfff00;
            border: 1px solid #bfff00;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            width: 100%;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .toggle-btn:hover {
            background: rgba(191, 255, 0, 0.2);
            box-shadow: 0 0 10px rgba(191, 255, 0, 0.3);
        }

        .dropdown-container {
            position: relative;
            width: 100%;
            margin-bottom: 16px;
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(191, 255, 0, 0.3);
            border-radius: 8px;
            margin-top: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 20;
        }

        .dropdown-menu.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-item {
            padding: 12px 16px;
            color: #e0e0e0;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .dropdown-item:last-child {
            border-bottom: none;
        }

        .dropdown-item:hover, .dropdown-item.active {
            background: rgba(191, 255, 0, 0.2);
            color: #bfff00;
        }

        /* Volume Slider */
        .volume-group {
            margin-top: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .volume-group label {
            font-size: 0.9rem;
            color: #e0e0e0;
            white-space: nowrap;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #bfff00;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(191, 255, 0, 0.5);
        }

        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #bfff00;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(191, 255, 0, 0.5);
            border: none;
        }
        
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .header-row h1 {
            margin: 0;
        }

        .icon-btn {
            background: none;
            border: none;
            color: #bfff00;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .icon-btn:hover {
            opacity: 1;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(191, 255, 0, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid #bfff00;
            color: #bfff00;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s ease;
            z-index: 100;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(-10px);
        }

        /* Secret Message Popup */
        .secret-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            font-size: 6rem;
            font-weight: 800;
            color: #bfff00;
            text-shadow: 0 0 20px #bfff00, 0 0 40px #bfff00, 0 0 80px #bfff00;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            pointer-events: none;
            text-align: center;
            white-space: nowrap;
        }

        .secret-message.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .secret-message img {
            max-width: 300px;
            filter: drop-shadow(0 0 20px #bfff00);
        }

        /* Intro Overlay */
        #intro-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            z-index: 50;
            pointer-events: none;
            transition: opacity 1.5s ease-in-out;
            width: 100%;
        }

        #intro-logo {
            width: 220px;
            height: auto;
            opacity: 0;
            animation: epicReveal 2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            filter: drop-shadow(0 0 15px rgba(191, 255, 0, 0.4));
        }

        @keyframes epicReveal {
            0% { 
                opacity: 0; 
                transform: scale(3) rotate(-10deg); 
                filter: blur(30px) brightness(2) drop-shadow(0 0 0 #bfff00);
            }
            30% { 
                opacity: 1; 
                transform: scale(0.9) rotate(5deg); 
                filter: blur(0px) brightness(1.5) drop-shadow(0 0 50px #bfff00);
            }
            50% { 
                transform: scale(1.05) rotate(-2deg); 
            }
            100% { 
                opacity: 1; 
                transform: scale(1) rotate(0deg); 
                filter: blur(0px) brightness(1) drop-shadow(0 0 15px rgba(191, 255, 0, 0.4));
            }
        }
        
        .intro-title {
            font-family: 'Caveat', cursive;
            font-size: 5rem;
            color: #bfff00;
            text-shadow: 0 0 15px rgba(191, 255, 0, 0.4);
            margin: 0;
            display: block;
            width: 100%;
            text-align: center;
            line-height: 1.1;
        }

        .intro-title::after {
            content: '|';
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Intro Mode UI Hiding */
        body.intro-active canvas,
        body.intro-active #ui-container,
        body.intro-active #social-container,
        body.intro-active #clock-container {
            opacity: 0 !important;
            pointer-events: none !important;
        }

        canvas, #ui-container, #social-container, #clock-container {
            transition: opacity 1.5s ease-in-out;
        }

        /* Clock Container */
        #clock-container {
            position: absolute;
            bottom: 24px;
            left: 24px;
            background: rgba(10, 10, 15, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 12px 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            color: #bfff00;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 2px;
            z-index: 10;
            transition: all 0.3s ease;
        }

        /* Social Contact Bar */
        #social-container {
            position: absolute;
            bottom: 24px;
            right: 24px;
            background: rgba(10, 10, 15, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 12px 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            display: flex;
            gap: 16px;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .social-icon {
            color: #bfff00;
            width: 24px;
            height: 24px;
            opacity: 0.7;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .social-icon:hover {
            opacity: 1;
            transform: scale(1.1);
            filter: drop-shadow(0 0 8px rgba(191, 255, 0, 0.5));
        }

        @media (max-width: 768px) {
            #intro-logo {
                width: 160px;
            }
            .intro-title {
                font-size: 3rem;
            }
            #ui-container {
                top: auto;
                bottom: 24px;
                right: 50%;
                transform: translateX(50%);
                width: calc(100vw - 48px);
                padding: 16px;
                min-width: auto;
            }
            h1 {
                font-size: 1.1rem;
            }
            .control-group {
                padding: 8px 12px;
                margin-bottom: 12px;
            }
            #social-container {
                top: 24px;
                bottom: auto;
                right: 24px;
                padding: 10px 16px;
                gap: 12px;
            }
            #clock-container {
                top: 24px;
                bottom: auto;
                left: 24px;
                padding: 10px 16px;
                font-size: 1rem;
            }
        }

        h1 {
            margin: 0 0 16px 0;
            font-size: 1.25rem;
            font-weight: 600;
            background: linear-gradient(90deg, #bfff00, #55cc00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .control-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 16px;
            border-radius: 8px;
        }

        .control-group label {
            font-size: 0.95rem;
            color: #e0e0e0;
        }

        input[type="color"] {
            appearance: none;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            overflow: hidden;
            background: none;
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            box-sizing: border-box;
        }

        #status-card {
            background: rgba(191, 255, 0, 0.1);
            border-left: 4px solid #bfff00;
            padding: 12px 16px;
            border-radius: 0 8px 8px 0;
            font-size: 0.85rem;
            color: #e6ffb0;
            line-height: 1.5;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(191, 255, 0, 0.3);
            border-radius: 50%;
            border-top-color: #bfff00;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        video {
            display: none;
        }

        /* Overlay for video debug (optional, keeping it hidden) */
        #debug-canvas {
            position: absolute;
            bottom: 24px;
            right: 24px;
            width: 160px;
            height: 120px;
            background: rgba(0,0,0,0.5);
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            display: none; /* Set to block if you want to see camera view */
            z-index: 10;
            transform: scaleX(-1);
        }
    </style>
</head>

    <script>
        // --- Three.js Setup ---
        const scene = new THREE.Scene();
        // Add subtle fog for depth
        scene.fog = new THREE.FogExp2(0x08080c, 0.05);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 4;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Particle System ---
        const particleCount = 12000; // Increased for better detail
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const basePositions = new Float32Array(particleCount * 3);
        const randoms = new Float32Array(particleCount * 3);

        for (let i = 0; i < particleCount; i++) {
            positions[i * 3] = 0;
            positions[i * 3 + 1] = 0;
            positions[i * 3 + 2] = 0;
            basePositions[i * 3] = 0;
            basePositions[i * 3 + 1] = 0;
            basePositions[i * 3 + 2] = 0;
            randoms[i * 3] = (Math.random() - 0.5) * 10;
            randoms[i * 3 + 1] = (Math.random() - 0.5) * 10;
            randoms[i * 3 + 2] = (Math.random() - 0.5) * 10;
        }

        function processImageData(imgData, width, height) {
            const validPixels = [];
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const index = (y * width + x) * 4;
                    const r = imgData.data[index];
                    const g = imgData.data[index + 1];
                    const b = imgData.data[index + 2];
                    const a = imgData.data[index + 3];
                    
                    if (a > 50) {
                        if (r > 240 && g > 240 && b > 240) continue;
                        if (r < 15 && g < 15 && b < 15) continue;
                        validPixels.push({ x: x, y: y });
                    }
                }
            }

            if (validPixels.length === 0) return;

            let minX = width, maxX = 0, minY = height, maxY = 0;
            validPixels.forEach(p => {
                if(p.x < minX) minX = p.x;
                if(p.x > maxX) maxX = p.x;
                if(p.y < minY) minY = p.y;
                if(p.y > maxY) maxY = p.y;
            });

            const boxWidth = maxX - minX;
            const boxHeight = maxY - minY;
            const centerX = minX + boxWidth / 2;
            const centerY = minY + boxHeight / 2;

            for (let i = 0; i < particleCount; i++) {
                const pixel = validPixels[Math.floor(Math.random() * validPixels.length)];
                
                const scale = 4.0 / Math.max(boxWidth, boxHeight);
                const normalizedX = (pixel.x - centerX) * scale;
                const normalizedY = -(pixel.y - centerY) * scale;
                
                const noiseX = (Math.random() - 0.5) * scale * 0.8;
                const noiseY = (Math.random() - 0.5) * scale * 0.8;
                const z = (Math.random() - 0.5) * 0.3;

                basePositions[i * 3] = normalizedX + noiseX;
                basePositions[i * 3 + 1] = normalizedY + noiseY;
                basePositions[i * 3 + 2] = z;
            }
        }

        function createParticlesFromImage(imageSource) {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const maxDim = 300;
                let width = img.width;
                let height = img.height;
                
                if (width > maxDim || height > maxDim) {
                    if (width > height) {
                        height = (height / width) * maxDim;
                        width = maxDim;
                    } else {
                        width = (width / height) * maxDim;
                        height = maxDim;
                    }
                }
                
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                
                ctx.clearRect(0, 0, width, height);
                ctx.drawImage(img, 0, 0, width, height);

                try {
                    const imgData = ctx.getImageData(0, 0, width, height);
                    processImageData(imgData, width, height);
                } catch (e) {
                    console.warn("CORS error reading image, falling back to default shape.");
                    createDefaultShape();
                }
            };
            img.onerror = () => {
                console.warn("Could not load image, falling back to default shape.");
                createDefaultShape();
            };
            img.src = imageSource;
        }

        function playBGM(pattern) {
            if (!bgmPlayer) return;
            let nextSrc = patternAudios[pattern];
            if (!nextSrc) nextSrc = 'bgm/manual.mp3';
            
            let vol = bgmPlayer.volume;
            const fadeOut = setInterval(() => {
                if (vol > 0.05) {
                    vol -= 0.05;
                    bgmPlayer.volume = vol;
                } else {
                    clearInterval(fadeOut);
                    bgmPlayer.src = nextSrc;
                    bgmPlayer.volume = 0;
                    
                    bgmPlayer.play().catch(e => console.log("BGM Error or Not Found:", e.message));
                    
                    const fadeIn = setInterval(() => {
                        if (vol < targetVolume - 0.05) {
                            vol += 0.05;
                            bgmPlayer.volume = vol;
                        } else {
                            bgmPlayer.volume = targetVolume;
                            clearInterval(fadeIn);
                        }
                    }, 100);
                }
            }, 100);

        // --- Math & Secret Gestures ---
        function getDistance(p1, p2) {
            return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
        }

        let isMessageShowing = false;
        const secretMessageEl = document.getElementById('secretMessage');
        
        let currentGesture = null;
        let gestureHoldTimer = 0;
        const GESTURE_HOLD_TIME = 500; // 0.5 seconds
        let lastDetectTime = Date.now();

        function triggerSecret(msg) {
            if (isMessageShowing) return;
            isMessageShowing = true;
            
            secretMessageEl.innerText = msg;
            secretMessageEl.classList.add('show');
            
            setTimeout(() => {
                secretMessageEl.classList.remove('show');
                setTimeout(() => { 
                    isMessageShowing = false; 
                    currentGesture = null;
                    gestureHoldTimer = 0;
                }, 2000); // 2s cooldown
            }, 5000);
        }

        function detectGestures(results) {
            if (isMessageShowing || autoModeActive) {
                lastDetectTime = Date.now();
                return;
            }

            const now = Date.now();
            const delta = now - lastDetectTime;
            lastDetectTime = now;

            const rightHand = results.rightHandLandmarks;
            const leftHand = results.leftHandLandmarks;
            const pose = results.poseLandmarks;
            const face = results.faceLandmarks;

            let hand = rightHand || leftHand;
            let detectedThisFrame = null;

            // 1. Hand Gestures
            if (hand) {
                const palm = hand[0];
                const thumbTip = hand[4];
                const indexTip = hand[8];
                const middleTip = hand[12];
                const ringTip = hand[16];
                const pinkyTip = hand[20];

                const isIndexFolded = getDistance(indexTip, palm) < 0.2;
                const isMiddleFolded = getDistance(middleTip, palm) < 0.2;
                const isRingFolded = getDistance(ringTip, palm) < 0.2;
                const isPinkyFolded = getDistance(pinkyTip, palm) < 0.2;

                // Thumbs up
                if (thumbTip.y < indexTip.y && isIndexFolded && isMiddleFolded && isRingFolded && isPinkyFolded) {
                    detectedThisFrame = "Hello Chad";
                }
                // Middle finger
                else if (!isMiddleFolded && isIndexFolded && isRingFolded && isPinkyFolded) {
                    detectedThisFrame = "🖕"; 
                }
            }

            // 2. Pose Gestures
            if (!detectedThisFrame && pose) {
                const leftAnkle = pose[27];
                const rightAnkle = pose[28];
                if ((leftAnkle && leftAnkle.visibility > 0.5 && leftAnkle.y < 0.7) || 
                    (rightAnkle && rightAnkle.visibility > 0.5 && rightAnkle.y < 0.7)) {
                    detectedThisFrame = "hello Mic";
                } else {
                    const rightWrist = pose[16];
                    const rightEye = pose[5]; 
                    if (rightWrist && rightEye && rightWrist.visibility > 0.5 && rightEye.visibility > 0.5) {
                        const distToEye = getDistance(rightWrist, rightEye);
                        if (distToEye < 0.2 && hand) { 
                            detectedThisFrame = "GRaiku";
                        }
                    }
                    if (!detectedThisFrame) {
                        const mouthLeft = pose[9];
                        const mouthRight = pose[10];
                        if (hand && mouthLeft && mouthRight && hand[8]) {
                            const distToMouthL = getDistance(hand[8], mouthLeft);
                            const distToMouthR = getDistance(hand[8], mouthRight);
                            if (distToMouthL < 0.1 || distToMouthR < 0.1) {
                                detectedThisFrame = "You're Dak right?";
                            }
                        }
                    }
                }
            }

            // 3. Face Gestures
            if (!detectedThisFrame && face) {
                const getEAR = (pTop, pBot, pLeft, pRight) => {
                    const vert = getDistance(pTop, pBot);
                    const horiz = getDistance(pLeft, pRight);
                    return vert / horiz;
                };
                
                const leftEAR = getEAR(face[159], face[145], face[33], face[133]);
                const rightEAR = getEAR(face[386], face[374], face[362], face[263]);
                
                if (leftEAR < 0.18 && rightEAR < 0.18) {
                    detectedThisFrame = "Goodnight Chad";
                } else {
                    const mouthWidth = getDistance(face[61], face[291]);
                    if (mouthWidth < 0.05) { 
                        detectedThisFrame = "I love you";
                    }
                }
            }

            // Check hold timer
            if (detectedThisFrame) {
                if (currentGesture === detectedThisFrame) {
                    gestureHoldTimer += delta;
                    if (gestureHoldTimer >= GESTURE_HOLD_TIME) {
                        triggerSecret(detectedThisFrame);
                    }
                } else {
                    currentGesture = detectedThisFrame;
                    gestureHoldTimer = 0;
                }
            } else {
                currentGesture = null;
                gestureHoldTimer = 0;
            }
        }

        // --- MediaPipe Holistic Setup ---
        const videoElement = document.getElementById('videoElement');

        function onResults(results) {
            // Hide spinner once we get first results
            if (spinner.style.display !== 'none') {
                spinner.style.display = 'none';
            }

            // Expand particles logic (1 hand needed)
            const activeHand = results.rightHandLandmarks || results.leftHandLandmarks;

            if (activeHand) {
                statusEl.innerText = "Hand detected.\nOpen/close hand to control particles.";
                
                // Use thumb (4) and pinky (20) to calculate hand span
                const p1 = activeHand[4];
                const p2 = activeHand[20];

                const dx = p1.x - p2.x;
                const dy = p1.y - p2.y;
                const dz = p1.z - p2.z;
                const distance = Math.sqrt(dx*dx + dy*dy + dz*dz);

                // Adjust based on normal span (0.1 to 0.4)
                const baseDist = 0.1;
                let normalizedDist = Math.max(0, distance - baseDist) * 5;
                
                targetExpansion = normalizedDist;
            } else {
                statusEl.innerText = "Please bring 1 hand into the frame to interact.";
                targetExpansion = 0;
            }

            // Secret Gestures Detection
            if (!autoModeActive) {
                detectGestures(results);
            }
        }

        const holistic = new Holistic({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`;
        }});
        
        holistic.setOptions({
            modelComplexity: 0,
            smoothLandmarks: true,
            enableSegmentation: false,
            smoothSegmentation: true,
            refineFaceLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        
        holistic.onResults(onResults);

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await holistic.send({image: videoElement});
            },
            width: 640,
            height: 480
        });

        // Start camera
        cameraUtils.start()
            .then(() => {
                statusEl.innerText = "Camera started. Initializing model...";
            })
            .catch((err) => {
                spinner.style.display = 'none';
                statusEl.innerText = "Error: Cannot access camera. Please grant permission.";
                console.error(err);
            });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        let lastTime = 0;
        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();
            const delta = elapsedTime - lastTime;
            lastTime = elapsedTime;

            const positionAttribute = geometry.attributes.position;
            const posArray = positionAttribute.array;

            if (autoModeActive) {
                autoModeTimer += delta;
                
                if (autoModeTimer >= 60) {
                    autoModeTimer = 0;
                    // Chu kỳ lặp lại cho duy nhất quy luật hiện tại
                }

                let patternWeight = 0;
                if (autoModeTimer > 2 && autoModeTimer <= 4) {
                    patternWeight = (autoModeTimer - 2) / 2; // Fade in
                } else if (autoModeTimer > 4 && autoModeTimer <= 58) {
                    patternWeight = 1; // Full pattern
                } else if (autoModeTimer > 58 && autoModeTimer <= 60) {
                    patternWeight = 1 - ((autoModeTimer - 58) / 2); // Fade out
                } else {
                    patternWeight = 0; // Logo
                }

                const pattern = patterns[currentPatternIndex];

                for (let i = 0; i < particleCount; i++) {
                    const basex = basePositions[i * 3];
                    const basey = basePositions[i * 3 + 1];
                    const basez = basePositions[i * 3 + 2];
                    const randx = randoms[i * 3];
                    const randy = randoms[i * 3 + 1];
                    const randz = randoms[i * 3 + 2];

                    let px = basex, py = basey, pz = basez;

                    if (patternWeight > 0) {
                        let ptx = basex, pty = basey, ptz = basez;
                        
                        if (pattern === 'waves') {
                            const gridX = (i % 100) / 100 * 10 - 5;
                            const gridZ = Math.floor(i / 100) / 100 * 10 - 5;
                            ptx = gridX;
                            ptz = gridZ;
                            pty = Math.sin(gridX * 2 + elapsedTime * 3) * 0.5 + Math.cos(gridZ * 2 + elapsedTime * 2) * 0.5;
                        } else if (pattern === 'hologram') {
                            // Dòng chảy xoắn ốc (Spiral Waterfall)
                            const flowY = 5 - ((elapsedTime * 3 + i * 0.01) % 10);
                            const angle = flowY * 2 + elapsedTime * 2; 
                            const radius = 1.5 + Math.sin(elapsedTime * 2 + i * 0.1) * 0.5;
                            ptx = Math.cos(angle) * radius;
                            pty = flowY;
                            ptz = Math.sin(angle) * radius;
                        } else if (pattern === 'galaxy') {
                            const radius = Math.sqrt(basex * basex + basey * basey + basez * basez) * 2 + 0.5;
                            const angle = Math.atan2(basey, basex) + elapsedTime + radius * 0.5;
                            ptx = Math.cos(angle) * radius;
                            pty = (basez + randz) * 0.2;
                            ptz = Math.sin(angle) * radius;
                        } else if (pattern === 'blackhole') {
                            // Hyperspace / Escape Space
                            const speed = 15;
                            const angle = (randx + 0.5) * Math.PI * 2;
                            const radius = 0.5 + Math.abs(randy) * 5; 
                            ptx = Math.cos(angle) * radius;
                            pty = Math.sin(angle) * radius;
                            
                            // Bay thẳng vào camera (trục Z)
                            ptz = ((randz * 20 + elapsedTime * speed * (1 + radius)) % 20) - 10;
                        } else if (pattern === 'rain') {
                            ptx = randx * 1.5;
                            ptz = randz * 1.5;
                            pty = 5 - ((elapsedTime * 4 + i * 0.02) % 10);
                        }

                        // Apply smooth transitions using easeInOut
                        const easeWeight = patternWeight < 0.5 ? 2 * patternWeight * patternWeight : 1 - Math.pow(-2 * patternWeight + 2, 2) / 2;
                        
                        px = basex * (1 - easeWeight) + ptx * easeWeight;
                        py = basey * (1 - easeWeight) + pty * easeWeight;
                        pz = basez * (1 - easeWeight) + ptz * easeWeight;
                    }

                    const breathing = Math.sin(elapsedTime * 2 + basex) * 0.02;
                    let finalX = px + px * breathing;
                    let finalY = py + py * breathing;
                    let finalZ = pz + pz * breathing;

                    posArray[i * 3]     = finalX;
                    posArray[i * 3 + 1] = finalY;
                    posArray[i * 3 + 2] = finalZ;
                }

                // Auto rotate camera slowly in auto mode
                particles.rotation.y = elapsedTime * 0.1;
                particles.rotation.x = Math.sin(elapsedTime * 0.05) * 0.2;

                material.opacity = 0.8;

            } else {
                // Manual Mode
                currentExpansion += (targetExpansion - currentExpansion) * 0.08;

                for (let i = 0; i < particleCount; i++) {
                    const basex = basePositions[i * 3];
                    const basey = basePositions[i * 3 + 1];
                    const basez = basePositions[i * 3 + 2];

                    const randx = randoms[i * 3];
                    const randy = randoms[i * 3 + 1];
                    const randz = randoms[i * 3 + 2];

                    const breathing = Math.sin(elapsedTime * 2 + basex) * 0.02;

                    const scale = 1 + currentExpansion * 1.5;
                    const scatter = currentExpansion * 1.5;

                    let finalX = basex * scale + randx * scatter + basex * breathing;
                    let finalY = basey * scale + randy * scatter + basey * breathing;
                    let finalZ = basez * scale + randz * scatter + basez * breathing;

                    posArray[i * 3]     = finalX;
                    posArray[i * 3 + 1] = finalY;
                    posArray[i * 3 + 2] = finalZ;
                }

                particles.rotation.y += 0.002;
                particles.rotation.x += 0.001;

                if (currentExpansion > 0.5) {
                    material.opacity = 0.8 + Math.sin(elapsedTime * 10) * 0.2;
                } else {
                    material.opacity = 0.8;
                }
            }
            
            if (isMessageShowing) {
                particles.visible = false;
            } else {
                particles.visible = true;
            }

            positionAttribute.needsUpdate = true;
            renderer.render(scene, camera);
        }

        // Typewriter Effect
        const textToType = "Raiku makes\nSolana inevitable";
        const introTitleEl = document.getElementById('intro-title');
        let typeIndex = 0;
        
        function typeWriter() {
            if (typeIndex < textToType.length) {
                if (textToType.charAt(typeIndex) === '\n') {
                    introTitleEl.innerHTML += '<br>';
                } else {
                    introTitleEl.innerHTML += textToType.charAt(typeIndex);
                }
                typeIndex++;
                setTimeout(typeWriter, 80); 
            } else {
                setTimeout(() => {
                    const overlay = document.getElementById('intro-overlay');
                    if (overlay) overlay.style.opacity = '0';
                    document.body.classList.remove('intro-active');
                }, 2000);
            }
        }
        // Start typing slightly after logo fades in
        setTimeout(typeWriter, 1200);

        animate();
    </script>
</body>
</html>
